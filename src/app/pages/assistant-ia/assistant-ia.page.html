<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab1"></ion-back-button>
    </ion-buttons>
    <ion-title>
      <ion-icon name="sparkles-outline" style="margin-right:6px;vertical-align:middle"></ion-icon>
      Assistant IA
    </ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="nouvelleConversation()" title="Nouvelle conversation">
        <ion-icon name="refresh-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div style="display:flex;flex-direction:column;height:100%">

    <!-- Zone messages -->
    <div #messagesContainer style="flex:1;overflow-y:auto;padding:12px">

      <!-- Messages -->
      <div *ngFor="let msg of messages" style="margin-bottom:12px"
           [style.text-align]="msg.role === 'user' ? 'right' : 'left'">
        <div style="display:inline-block;max-width:80%">
          <div [style.background]="msg.role === 'user' ? 'var(--ion-color-primary)' : '#f0f0f0'"
               [style.color]="msg.role === 'user' ? '#fff' : '#222'"
               style="padding:10px 14px;border-radius:18px;font-size:14px;white-space:pre-wrap;line-height:1.5;text-align:left">
            {{ msg.texte }}
          </div>
          <div style="font-size:10px;color:#aaa;margin-top:2px;padding:0 4px">{{ msg.heure }}</div>
        </div>
      </div>

      <!-- Typing indicator -->
      <div *ngIf="loading" style="text-align:left;margin-bottom:12px">
        <div style="display:inline-block;background:#f0f0f0;padding:10px 14px;border-radius:18px">
          <ion-spinner name="dots" style="width:24px;height:16px"></ion-spinner>
        </div>
      </div>

    </div>

    <!-- Questions prédéfinies -->
    <div *ngIf="afficherQuestions && !loading" style="padding:8px 12px;border-top:1px solid #eee">
      <div style="font-size:11px;color:#888;margin-bottom:6px">Suggestions :</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        <ion-chip *ngFor="let q of questionsPredefinies"
                  (click)="poserQuestionPredefinies(q.id)"
                  color="primary" outline="true"
                  style="font-size:12px;cursor:pointer">
          <ion-icon [name]="q.icone" style="margin-right:4px"></ion-icon>
          {{ q.label }}
        </ion-chip>
      </div>
    </div>

    <!-- Zone saisie -->
    <div style="padding:8px 12px;border-top:1px solid #eee;background:#fafafa;display:flex;align-items:center;gap:8px">
      <ion-input
        [(ngModel)]="texteLibre"
        placeholder="Posez votre question..."
        (keyup.enter)="envoyerTexteLibre()"
        style="flex:1;background:#fff;border-radius:20px;padding:4px 12px;border:1px solid #ddd;font-size:14px">
      </ion-input>
      <ion-button shape="round" [disabled]="!texteLibre.trim() || loading" (click)="envoyerTexteLibre()">
        <ion-icon name="send-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </div>

  </div>
</ion-content>
